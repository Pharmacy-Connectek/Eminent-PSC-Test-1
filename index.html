<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eminent PSC Mock tests</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --neutral-grey: #6b7280;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            box-sizing: border-box;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 15px;
        }

        .logo {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
        }

        h1 {
            color: var(--primary-color);
            font-size: 26px;
            text-align: center;
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: 600;
            color: #6b7280;
        }

        .progress-bar {
            background-color: #e5e7eb;
            border-radius: 10px;
            height: 8px;
            width: 70%;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--secondary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .statement-box {
            background-color: #f9fafb;
            border-left: 4px solid var(--secondary-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            line-height: 1.6;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 14px 20px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f0fdf4;
            border-color: var(--secondary-color);
        }

        .option-btn.correct {
            background-color: #d1fae5;
            border-color: var(--success-color);
            color: #065f46;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        .explanation-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: none;
            font-size: 15px;
            line-height: 1.6;
        }

        .explanation-box strong {
            color: var(--primary-color);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            align-items: center;
        }

        .nav-btn {
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .prev-btn {
            background-color: var(--neutral-grey);
        }

        .prev-btn:hover {
            background-color: #4b5563;
        }

        .next-btn {
            background-color: var(--primary-color);
        }

        .next-btn:hover {
            background-color: #1d4ed8;
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #eff6ff;
            border: 5px solid var(--secondary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            margin: 30px auto;
            color: var(--primary-color);
        }

        .restart-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- Quiz Interface -->
    <div id="quiz-screen">
        <div class="brand-header">
            <img src="Eminent PSC Logo" class="logo">
            <h1>Eminent PSC Mock tests</h1>
        </div>
        
        <div class="progress-container">
            <span id="progress-text">ചോദ്യം 1/20</span>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div id="statements" class="statement-box" style="display: none;"></div>
        <div id="question" class="question-text"></div>
        
        <div id="options" class="options-container"></div>

        <div id="explanation" class="explanation-box"></div>

        <div class="nav-container">
            <button id="prev-button" class="nav-btn prev-btn" onclick="prevQuestion()">മുൻപത്തെ ചോദ്യം</button>
            <button id="next-button" class="nav-btn next-btn" style="display: none;" onclick="nextQuestion()">അടുത്ത ചോദ്യം</button>
        </div>
    </div>

    <!-- Result Interface -->
    <div id="result-screen" class="result-screen">
        <div class="brand-header">
            <img src="image_7b0465.png" alt="Eminent PSC Logo" class="logo">
            <h1>ടെസ്റ്റ് പൂർത്തിയായി!</h1>
        </div>
        <p style="font-size: 18px; margin-top: 20px;">നിങ്ങളുടെ ആകെ സ്കോർ:</p>
        <div id="score-display" class="score-circle">0 / 20</div>
        <p id="performance-message" style="font-size: 16px; font-weight: 600; margin-bottom: 30px;"></p>
        <button class="restart-btn" onclick="restartQuiz()">വീണ്ടും ശ്രമിക്കുക</button>
    </div>
</div>

<script>
    const quizData = [
        {
            statements: "I. തെക്കുപടിഞ്ഞാറൻ മൺസൂൺ കാലത്ത് കടൽ പ്രക്ഷുബ്ധമാകുമ്പോഴാണ് ഇത് സാധാരണയായി രൂപപ്പെടുന്നത്.<br>II. കടലിന്റെ അടിത്തട്ടിലെ സൂക്ഷ്മമായ കളിമണ്ണും (Silt and Clay) ജൈവാംശങ്ങളും മുകളിലേക്ക് ഉയരുന്ന പ്രതിഭാസമാണിത്.<br>III. ആലപ്പുഴയിലെ പുറക്കാട് തീരം ചാകര രൂപീകരണത്തിന് ആഗോളതലത്തിൽ തന്നെ പ്രശസ്തമാണ്.",
            question: "കേരള തീരത്തെ 'ചാകര' (Mudbanks) രൂപീകരണവുമായി ബന്ധപ്പെട്ട മുകളിൽ നൽകിയ പ്രസ്താവനകൾ പരിശോധിക്കുക:",
            options: ["I, II എന്നിവ മാത്രം ശരി", "II, III എന്നിവ മാത്രം ശരി", "I, III എന്നിവ മാത്രം ശരി", "I, II, III എന്നിവയെല്ലാം ശരി"],
            answer: 3,
            explanation: "മൺസൂൺ കാലത്തെ പ്രത്യേക തരം തരംഗ ചലനങ്ങളും (Wave action) ഭൂഗർഭ മൺതുരുത്തുകളുടെ സ്ഥാനചലനവുമാണ് ചാകരയ്ക്ക് കാരണം. ഈ സമയത്ത് കടൽ ശാന്തമാവുകയും ധാരാളമായി മീനുകൾ ഇവിടെ കേന്ദ്രീകരിക്കുകയും ചെയ്യുന്നു."
        },
        {
            statements: "I. പോസിറ്റീവ് IOD ഉള്ള വർഷങ്ങളിൽ പടിഞ്ഞാറൻ ഇന്ത്യൻ മഹാസമുദ്രത്തിലെ (അറബിക്കടൽ) ഉപരിതല താപനില കിഴക്കൻ സമുദ്രത്തേക്കാൾ കൂടുതലായിരിക്കും.<br>II. പോസിറ്റീവ് IOD സാധാരണയായി കേരളത്തിൽ ശക്തമായ മൺസൂൺ മഴയ്ക്ക് കാരണമാവുകയും എൽ നിനോയുടെ (El Nino) ദോഷഫലങ്ങളെ പ്രതിരോധിക്കുകയും ചെയ്യുന്നു.<br>III. നെഗറ്റീവ് IOD ഉള്ള വർഷങ്ങളിൽ അറബിക്കടലിൽ മഴയുടെ അളവ് куത്തനെ കൂടുന്നു.",
            question: "ഇന്ത്യൻ മൺസൂണിനെ സ്വാധീനിക്കുന്ന 'ഇന്ത്യൻ മഹാസമുദ്ര ദ്വിധ്രുവം' (Indian Ocean Dipole - IOD) സംബന്ധിച്ച പ്രസ്താവനകളിൽ ഏതാണ് ശരി?",
            options: ["I മാത്രം", "I, II എന്നിവ മാത്രം", "II, III എന്നിവ മാത്രം", "I, II, III എല്ലാം ശരി"],
            answer: 1,
            explanation: "നെഗറ്റീവ് IOD ഉള്ളപ്പോൾ കിഴക്കൻ ഇന്ത്യൻ മഹാസമുദ്രത്തിലാണ് താപനില കൂടുന്നത്. ഇത് ഇന്ത്യയിൽ മൺസൂൺ മഴ കുറയാൻ കാരണമാകുന്നു. അതിനാൽ മൂന്നാമത്തെ പ്രസ്താവന തെറ്റാണ്."
        },
        {
            statements: "I. ഇവ പ്ലീസ്റ്റോസീൻ (Pleistocene) യുഗത്തിലെ തടാക നിക്ഷേപങ്ങളാണ് (Lacustrine deposits).<br>II. ലോകപ്രശസ്തമായ കാശ്മീരി കുങ്കുമപ്പൂവ് (Saffron/Zafran) കൃഷി ചെയ്യുന്നത് ഇത്തരം മണ്ണിലാണ്.<br>III. ഝലം നദിയും അതിന്റെ പോഷകനദികളും ചേർന്നാണ് ഈ പീഠഭൂമി സദൃശ്യമായ നിക്ഷേപങ്ങൾ രൂപപ്പെടുത്തിയത്.",
            question: "കാശ്മീർ താഴ്‌വരയിൽ കാണപ്പെടുന്ന 'കരേവകൾ' (Karewas) എന്ന ഭൗമപ്രകൃതിയെക്കുറിച്ചുള്ള പ്രസ്താവനകളിൽ ശരിയായത് ഏത്?",
            options: ["I, II എന്നിവ മാത്രം", "II, III എന്നിവ മാത്രം", "I, III എന്നിവ മാത്രം", "I, II, III എല്ലാം ശരി"],
            answer: 3,
            explanation: "പണ്ട് താഴ്‌വരയിലുണ്ടായിരുന്ന വലിയ തടാകങ്ങൾ വറ്റിവരണ്ടപ്പോൾ അടിഞ്ഞുകൂടിയ കളിമണ്ണും മണലും ചേർന്ന കനത്ത പാളികളാണ് കരേവകൾ. ഇത് കുങ്കുമപ്പൂവിന് പുറമെ ആപ്പിൾ, ബദാം കൃഷിക്കും അനുയോജ്യമാണ്."
        },
        {
            statements: "I. കേരളത്തിലെ ഭൂരിഭാഗം പ്രദേശങ്ങളും (ഏകദേശം 88%) പ്രീ-കാംബ്രിയൻ യുഗത്തിലെ 'ചാർണോക്കൈറ്റ്' (Charnockite), 'കോൺഡലൈറ്റ്' (Khondalite) ശിലകളാൽ നിർമ്മിതമാണ്.<br>II. തൃതീയ യുഗത്തിലെ (Tertiary period) നിക്ഷേപങ്ങളായ 'വർക്കല ഫോർമേഷൻസ്' ലിഗ്നൈറ്റ്, ചൈനാക്ലേ നിക്ഷേപങ്ങൾക്ക് പ്രസിദ്ധമാണ്.<br>III. ചവറയിലെ കരിമണൽ നിക്ഷേപം കാണപ്പെടുന്നത് ഏറ്റവും പ്രായം കുറഞ്ഞ ക്വട്ടേണറി (Quaternary) യുഗത്തിലെ തീരദേശ നിക്ഷേപങ്ങളിലാണ്.",
            question: "കേരളത്തിന്റെ ഭൗമശാസ്ത്ര ഘടനയെ (Geology of Kerala) സംബന്ധിച്ച താഴെ പറയുന്ന പ്രസ്താവനകൾ വിലയിരുത്തുക:",
            options: ["I, II എന്നിവ മാത്രം", "II, III എന്നിവ മാത്രം", "I, III എന്നിവ മാത്രം", "I, II, III എല്ലാം ശരി"],
            answer: 3,
            explanation: "കേരളത്തിന്റെ അടിത്തറ രൂപപ്പെട്ടിരിക്കുന്നത് അതിപുരാതനമായ സ്ഫടിക ശിലകൾ (Crystalline rocks) കൊണ്ടാണ്. പടിഞ്ഞാറൻ തീരപ്രദേശങ്ങളിലാണ് താരതമ്യേന പ്രായം കുറഞ്ഞ തൃതീയ-ക്വട്ടേണറി യുഗങ്ങളിലെ അവസാദ ശിലകളും കരിമണലും കാണപ്പെടുന്നത്."
        },
        {
            statements: "<strong>പ്രസ്താവന (A):</strong> പശ്ചിമഘട്ടം യഥാർത്ഥ മടക്കുപർവ്വതങ്ങളല്ല (Fold Mountains), മറിച്ച് ഒരു ഭ്രംശ പീഠഭൂമിയുടെ (Fault-block/Escarpment) അരികുകളാണ്.<br><strong>காரണം (R):</strong> അറേബ്യൻ കടൽ രൂപപ്പെട്ടപ്പോൾ ഇന്ത്യൻ ഉപദ്വീപിന്റെ പടിഞ്ഞാറൻ ഭാഗം താഴേക്ക് ഇടിഞ്ഞുപോയതിന്റെ (Subsided Faulting) ഫലമായാണ് പശ്ചിമഘട്ടത്തിന്റെ പടിഞ്ഞാറൻ ചരിവ് കുത്തനെയുള്ളതായി മാറിയത്.",
            question: "പശ്ചിമഘട്ടത്തിന്റെ നിർമ്മിതിയെക്കുറിച്ചുള്ള ഈ പ്രസ്താവനകൾ വിശകലനം ചെയ്യുക:",
            options: [
                "A, R എന്നിവ ശരിയാണ്, R എന്നത് A യുടെ ശരിയായ വിശദീകരണമാണ്.",
                "A, R എന്നിവ ശരിയാണ്, എന്നാൽ R എന്നത് A യുടെ ശരിയായ വിശദീകരണമല്ല.",
                "A ശരിയാണ്, എന്നാൽ R തെറ്റാണ്.",
                "A തെറ്റാണ്, എന്നാൽ R ശരിയാണ്."
            ],
            answer: 0,
            explanation: "ഹിമാലയം പോലെ രണ്ട് പ്ലേറ്റുകൾ ഇടിച്ചുണ്ടായ മടക്കുകളല്ല പശ്ചിമഘട്ടം. ഗോണ്ട്വാന ലാൻഡ് പിളർന്ന് മാറിയപ്പോൾ ഉണ്ടായ ഭ്രംശനം (Faulting) മൂലം ഒരു വശം കുത്തനെ ഉയർന്നുവന്നതാണ് ഇതിന്റെ ഘടന."
        },
        {
            statements: null,

    let currentQuestionIndex = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const progressText = document.getElementById('progress-text');
    const progressFill = document.getElementById('progress-fill');
    const statementsDiv = document.getElementById('statements');
    const questionDiv = document.getElementById('question');
    const optionsDiv = document.getElementById('options');
    const explanationDiv = document.getElementById('explanation');
    const prevButton = document.getElementById('prev-button');
    const nextButton = document.getElementById('next-button');

    function loadQuestion() {
        const currentQuestion = quizData[currentQuestionIndex];
        
        if (currentQuestionIndex === 0) {
            prevButton.style.visibility = 'hidden'; 
        } else {
            prevButton.style.visibility = 'visible';
        }

        progressText.innerText = `ചോദ്യം ${currentQuestionIndex + 1}/${quizData.length}`;
        progressFill.style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;

        if (currentQuestion.statements) {
            statementsDiv.innerHTML = currentQuestion.statements;
            statementsDiv.style.display = 'block';
        } else {
            statementsDiv.style.display = 'none';
        }

        questionDiv.innerText = currentQuestion.question;

        optionsDiv.innerHTML = '';
        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option;
            button.onclick = () => checkAnswer(index, button);
            optionsDiv.appendChild(button);
        });

        if (userAnswers[currentQuestionIndex] !== null) {
            const savedIndex = userAnswers[currentQuestionIndex];
            const buttons = optionsDiv.querySelectorAll('.option-btn');
            
            buttons.forEach(button => button.disabled = true);

            if (savedIndex === currentQuestion.answer) {
                buttons[savedIndex].classList.add('correct');
            } else {
                buttons[savedIndex].classList.add('wrong');
                buttons[currentQuestion.answer].classList.add('correct');
            }

            explanationDiv.innerHTML = `<strong>ശരീയുത്തരം: ${currentQuestion.options[currentQuestion.answer]}</strong><br><br>${currentQuestion.explanation}`;
            explanationDiv.style.display = 'block';
            
            nextButton.style.display = 'block';
            updateNextButtonText();
        } else {
            explanationDiv.style.display = 'none';
            nextButton.style.display = 'none';
        }
    }

    function checkAnswer(selectedIndex, clickedButton) {
        userAnswers[currentQuestionIndex] = selectedIndex;
        const currentQuestion = quizData[currentQuestionIndex];
        const buttons = optionsDiv.querySelectorAll('.option-btn');

        buttons.forEach(button => button.disabled = true);

        if (selectedIndex === currentQuestion.answer) {
            clickedButton.classList.add('correct');
        } else {
            clickedButton.classList.add('wrong');
            buttons[currentQuestion.answer].classList.add('correct');
        }

        explanationDiv.innerHTML = `<strong>ശരിയായ ഉത്തരം: ${currentQuestion.options[currentQuestion.answer]}</strong><br><br>${currentQuestion.explanation}`;
        explanationDiv.style.display = 'block';

        nextButton.style.display = 'block';
        updateNextButtonText();
    }

    function updateNextButtonText() {
        if (currentQuestionIndex === quizData.length - 1) {
            nextButton.innerText = "ഫലം കാണുക";
        } else {
            nextButton.innerText = "അടുത്ത ചോദ്യം";
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        
        let finalScore = 0;
        userAnswers.forEach((ans, idx) => {
            if (ans === quizData[idx].answer) finalScore++;
        });

        document.getElementById('score-display').innerText = `${finalScore} / ${quizData.length}`;
        
        const messageDiv = document.getElementById('performance-message');
        if(finalScore >= 18) {
            messageDiv.innerText = "മികച്ച വിജയം! നിങ്ങൾ KAS / Degree Level പരീക്ഷകൾക്ക് പൂർണ്ണ സജ്ജനാണ്. 🏆";
            messageDiv.style.color = "var(--success-color)";
        } else if(finalScore >= 12) {
            messageDiv.innerText = "നല്ല പ്രകടനം! കുറച്ചുകൂടി ശ്രദ്ധിച്ചാൽ ഉയർന്ന മാർക്ക് നേടാം. 👍";
            messageDiv.style.color = "var(--secondary-color)";
        } else {
            messageDiv.innerText = "കൂടുതൽ പരിശീലനം ആവശ്യമുണ്ട്. വിശദീകരണങ്ങൾ വീണ്ടും വായിച്ചു പഠിക്കുക. 📚";
            messageDiv.style.color = "var(--danger-color)";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        userAnswers = new Array(quizData.length).fill(null);
        resultScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        loadQuestion();
    }

    loadQuestion();
</script>
